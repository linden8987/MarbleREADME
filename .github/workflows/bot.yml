      - name: Health Check
        id: repair
        run: |
          REPAIRED=false

          # 1. Check if JSON is actually valid and has coordinates
          if [ ! -f ".marble_state.json" ] || ! jq -e '.x' .marble_state.json > /dev/null 2>&1; then
            echo '{"x": 4, "z": 4, "status": "playing"}' > .marble_state.json
            REPAIRED=true
            echo "LOG=Reset corrupted JSON." >> $GITHUB_OUTPUT
          fi

          # 2. Check if README is missing OR doesn't contain the game grid
          # If the file exists but doesn't have a marble, it's a "blank" game.
          if [ ! -f "README.md" ] || ! grep -q "⚪" README.md; then
            echo "# 🕹️ Marble Game (Restored)" > README.md
            echo "The bot detected a broken screen and reset it. Move to play!" >> README.md
            # We delete the JSON to force the next move to start from center
            echo '{"x": 4, "z": 4, "status": "playing"}' > .marble_state.json
            REPAIRED=true
            echo "LOG=README was blank or broken. Resetting game." >> $GITHUB_OUTPUT
          fi

          echo "WAS_REPAIRED=$REPAIRED" >> $GITHUB_OUTPUT
