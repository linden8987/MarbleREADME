name: Update Marble Position

on:
  repository_dispatch:
    types: [move_north, move_south, move_east, move_west, jump]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'move_north'
        type: choice
        options: [move_north, move_south, move_east, move_west, jump]

jobs:
  update-marble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Physics and Rendering Engine
        id: engine
        run: |
          sudo apt-get install -y bc

          # Load state (Grid is 0-9)
          if [ -f ".marble_state.json" ]; then
            X=$(jq -r '.x // 4' .marble_state.json)
            Z=$(jq -r '.z // 4' .marble_state.json)
          else
            X=4; Z=4
          fi

          ACTION="${{ github.event.action || github.event.client_payload.action || github.event.inputs.action }}"
          
          # Move Logic (Clamped between 0 and 9)
          case $ACTION in
            move_north) Z=$(echo "$Z - 1" | bc) ;;
            move_south) Z=$(echo "$Z + 1" | bc) ;;
            move_east)  X=$(echo "$X + 1" | bc) ;;
            move_west)  X=$(echo "$X - 1" | bc) ;;
          esac

          # Clamping to grid boundaries
          if (( $(echo "$X < 0" | bc -l) )); then X=0; fi
          if (( $(echo "$X > 9" | bc -l) )); then X=9; fi
          if (( $(echo "$Z < 0" | bc -l) )); then Z=0; fi
          if (( $(echo "$Z > 9" | bc -l) )); then Z=9; fi

          # Save state
          echo "{\"x\": $X, \"z\": $Z}" > .marble_state.json

          # --- RENDER ENGINE ---
          # We build the grid using ⬛ for floor and ⚪ for the marble
          SCREEN=""
          for row in {0..9}
          do
            LINE=""
            for col in {0..9}
            do
              if [ "$row" -eq "$Z" ] && [ "$col" -eq "$X" ]; then
                LINE="${LINE}⚪"
              else
                LINE="${LINE}⬛"
              fi
            done
            SCREEN="${SCREEN}${LINE}<br>"
          done
          
          # Use a heredoc to save the screen to output without escaping issues
          echo "SCREEN_DATA<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SCREEN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "X=$X" >> $GITHUB_OUTPUT
          echo "Z=$Z" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          cat <<EOF > README.md
          # 🕹️ Emoji Marble Game
          
          ${{ steps.engine.outputs.SCREEN_DATA }}

          ### Controls
          | [⬅️ West](https://github.com/${{ github.repository }}/actions) | [⬆️ North](https://github.com/${{ github.repository }}/actions) | [⬇️ South](https://github.com/${{ github.repository }}/actions) | [➡️ East](https://github.com/${{ github.repository }}/actions) |
          | :---: | :---: | :---: | :---: |

          **Position:** X: ${{ steps.engine.outputs.X }}, Z: ${{ steps.engine.outputs.Z }}
          
          *Click 'Actions' and run the workflow to move!*
          EOF

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .marble_state.json README.md
          git commit -m "Marble moved to ${{ steps.engine.outputs.X }}, ${{ steps.engine.outputs.Z }}"
          git push
