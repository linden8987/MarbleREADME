<!DOCTYPE html>
<html>
<body style="background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 50px;">
    <h2>Marble Controller</h2>
    <div id="setup" style="display:none;">
        <p>Enter your GitHub PAT to start playing:</p>
        <input type="password" id="tokenInput" placeholder="ghp_xxxx..." style="padding: 10px; width: 300px;">
        <button onclick="saveToken()" style="padding: 10px;">Save Token</button>
    </div>
    
    <div id="game-ui">
        <p>Use <b>WASD</b>, <b>Arrows</b>, or a <b>Gamepad</b></p>
        <h1 id="status" style="color: #58a6ff;">Ready</h1>
        <button onclick="clearToken()" style="margin-top: 20px; color: #f85149; background: none; border: 1px solid #f85149; cursor: pointer;">Reset Token</button>
    </div>

    <script>
        const REPO = "YOUR_USERNAME/YOUR_REPO_NAME"; // Change this!

        // Load token from browser storage
        let TOKEN = localStorage.getItem('marble_token');

        if (!TOKEN) {
            document.getElementById('setup').style.display = 'block';
            document.getElementById('game-ui').style.display = 'none';
        }

        function saveToken() {
            const input = document.getElementById('tokenInput').value;
            if (input) {
                localStorage.setItem('marble_token', input);
                location.reload();
            }
        }

        function clearToken() {
            localStorage.removeItem('marble_token');
            location.reload();
        }

        async function move(direction) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "Moving " + direction.toUpperCase() + "...";
            statusEl.style.color = "#d29922";

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `token ${localStorage.getItem('marble_token')}`, 
                        'Accept': 'application/vnd.github.v3+json' 
                    },
                    body: JSON.stringify({ event_type: `move_${direction}` })
                });

                if (response.ok) {
                    statusEl.innerText = "Success!";
                    statusEl.style.color = "#3fb950";
                } else {
                    statusEl.innerText = "Error: " + response.status;
                    statusEl.style.color = "#f85149";
                }
            } catch (err) {
                statusEl.innerText = "Failed to connect";
            }
            
            setTimeout(() => { 
                statusEl.innerText = "Ready"; 
                statusEl.style.color = "#58a6ff";
            }, 2000);
        }

        // Keyboard Support
        window.addEventListener("keydown", (e) => {
            if (!localStorage.getItem('marble_token')) return;
            const key = e.key.toLowerCase();
            if (key === "w" || key === "arrowup") move("north");
            if (key === "s" || key === "arrowdown") move("south");
            if (key === "a" || key === "arrowleft") move("west");
            if (key === "d" || key === "arrowright") move("east");
        });

        // Controller / Gamepad Polling
        let canMove = true;
        setInterval(() => {
            const gp = navigator.getGamepads()[0];
            if (!gp || !canMove || !localStorage.getItem('marble_token')) return;

            // Simple debounce to prevent spamming the API
            if (gp.axes[1] < -0.5) { move("north"); throttle(); }
            else if (gp.axes[1] > 0.5) { move("south"); throttle(); }
            else if (gp.axes[0] < -0.5) { move("west"); throttle(); }
            else if (gp.axes[0] > 0.5) { move("east"); throttle(); }
        }, 150);

        function throttle() {
            canMove = false;
            setTimeout(() => { canMove = true; }, 1500); // 1.5s delay between moves
        }
    </script>
</body>
</html>
