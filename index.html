<!DOCTYPE html>
<html>
<body style="background: #0d1117; color: white; font-family: sans-serif; text-align: center;">
    <h2>Marble Controller</h2>
    <p>Use <b>WASD</b>, <b>Arrows</b>, or a <b>Gamepad</b></p>
    <p id="status">Ready...</p>

    <script>
        const REPO = "linden8987/MarbleREADME";
        const TOKEN = "YOUR_GITHUB_PAT"; // Or use a prompt to ask the user for one

        async function move(direction) {
            document.getElementById('status').innerText = "Moving " + direction + "...";
            await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ event_type: `move_${direction}` })
            });
            setTimeout(() => { document.getElementById('status').innerText = "Ready"; }, 1000);
        }

        window.addEventListener("keydown", (e) => {
            if (e.key === "w" || e.key === "ArrowUp") move("north");
            if (e.key === "s" || e.key === "ArrowDown") move("south");
            if (e.key === "a" || e.key === "ArrowLeft") move("west");
            if (e.key === "d" || e.key === "ArrowRight") move("east");
        });

        // Basic Gamepad Support
        setInterval(() => {
            const gp = navigator.getGamepads()[0];
            if (!gp) return;
            if (gp.axes[1] < -0.5) move("north");
            if (gp.axes[1] > 0.5) move("south");
            if (gp.axes[0] < -0.5) move("west");
            if (gp.axes[0] > 0.5) move("east");
        }, 200);
    </script>
</body>
</html>
